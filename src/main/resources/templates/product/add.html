<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>제품 등록</title>
    <style>
        :root{
            --bg:#0b1220; --card:#121a2b; --line:rgba(255,255,255,.10);
            --text:#eaf0ff; --muted:#9aa6bd; --primary:#6ea8fe; --shadow:0 18px 50px rgba(0,0,0,.35);
            --radius:16px; --focus:0 0 0 4px rgba(110,168,254,.25); --max:900px;
        }
        *{box-sizing:border-box}
        body{
            margin:0; min-height:100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, sans-serif;
            background:
                    radial-gradient(900px 500px at 10% 10%, rgba(110,168,254,.25), transparent 60%),
                    radial-gradient(900px 500px at 90% 20%, rgba(126,231,135,.15), transparent 55%),
                    var(--bg);
            color:var(--text);
        }
        .wrap{max-width:var(--max); margin:0 auto; padding:28px 18px 60px}
        .card{
            background:rgba(18,26,43,.80);
            border:1px solid var(--line);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:22px;
            backdrop-filter: blur(10px);
        }
        h1{margin:0 0 8px; font-size:26px}
        .sub{margin:0 0 18px; color:var(--muted); line-height:1.6}
        label{display:block; font-weight:800; margin:12px 0 6px}
        input{
            width:100%; padding:12px 12px;
            border-radius:12px;
            border:1px solid var(--line);
            background:rgba(255,255,255,.03);
            color:var(--text);
            outline:none;
        }
        input:focus{box-shadow:var(--focus); border-color:rgba(110,168,254,.45)}
        .row{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap}
        .btn{
            padding:12px 12px; border-radius:12px;
            border:1px solid var(--line);
            background:rgba(255,255,255,.04);
            color:var(--text);
            font-weight:800; cursor:pointer;
            transition:.15s ease;
            display:inline-flex; align-items:center; justify-content:center;
            white-space:nowrap;
        }
        .btn:hover{transform: translateY(-1px); background:rgba(255,255,255,.07)}
        .btn.primary{border-color:rgba(110,168,254,.35); background:rgba(110,168,254,.18)}
        .btn:focus{outline:none; box-shadow:var(--focus)}
        .badge{
            display:inline-flex; align-items:center; gap:8px;
            padding:10px 12px;
            border-radius:999px;
            border:1px solid var(--line);
            background:rgba(255,255,255,.03);
            color:var(--muted);
            font-weight:750;
        }
    </style>
</head>
<body>
<div class="wrap">
    <section class="card">
        <h1>제품 등록</h1>
        <p class="sub">상품명과 가격을 입력하면 등록됩니다. 작성자는 로그인 계정으로 자동 저장됩니다.</p>

        <div class="badge">
            로그인: <b th:text="${#authentication.name}">user</b>
        </div>

        <form th:action="@{/product/add}" method="post" style="margin-top:14px;">
            <label for="name">상품명</label>
            <input id="name" name="name" placeholder="예: 기계식 키보드" required>

            <label for="price">가격</label>
            <input id="price" name="price" type="number" min="0" step="1" placeholder="예: 129000" required>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="row">
                <button class="btn primary" type="submit">등록</button>
                <a class="btn" th:href="@{/product/list}">목록으로</a>
                <a class="btn" th:href="@{/}">홈으로</a>
            </div>
        </form>
    </section>
</div>
</body>
</html>
