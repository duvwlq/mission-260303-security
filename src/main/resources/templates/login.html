<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login</title>
    <style>
        :root{
            --bg:#0b1220; --card:#121a2b; --line:rgba(255,255,255,.10);
            --text:#eaf0ff; --muted:#9aa6bd; --primary:#6ea8fe; --danger:#ff6b6b;
            --shadow:0 18px 50px rgba(0,0,0,.35); --radius:16px; --focus:0 0 0 4px rgba(110,168,254,.25);
        }
        *{box-sizing:border-box}
        body{
            margin:0; min-height:100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, sans-serif;
            background:
                    radial-gradient(900px 500px at 10% 10%, rgba(110,168,254,.25), transparent 60%),
                    radial-gradient(900px 500px at 90% 20%, rgba(255,107,107,.15), transparent 55%),
                    var(--bg);
            color:var(--text);
            display:grid; place-items:center;
            padding:22px;
        }
        a{color:inherit; text-decoration:none}
        .card{
            width:min(520px, 100%);
            background:rgba(18,26,43,.80);
            border:1px solid var(--line);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:24px;
            backdrop-filter: blur(10px);
        }
        h1{margin:0 0 8px; font-size:26px; letter-spacing:-.2px}
        .sub{margin:0 0 18px; color:var(--muted); line-height:1.6}
        .msg{
            border:1px solid var(--line);
            background:rgba(255,255,255,.04);
            padding:12px 14px; border-radius:14px;
            margin:0 0 14px;
            color:var(--muted);
            font-weight:650;
        }
        .msg.error{border-color:rgba(255,107,107,.35); background:rgba(255,107,107,.10); color:#ffd0d0}
        .msg.ok{border-color:rgba(110,168,254,.35); background:rgba(110,168,254,.12); color:#d8e6ff}
        label{display:block; font-weight:750; margin:12px 0 6px}
        input{
            width:100%; padding:12px 12px;
            border-radius:12px;
            border:1px solid var(--line);
            background:rgba(255,255,255,.03);
            color:var(--text);
            outline:none;
        }
        input:focus{box-shadow:var(--focus); border-color:rgba(110,168,254,.45)}
        .row{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap}
        .btn{
            flex:1;
            padding:12px 12px;
            border-radius:12px;
            border:1px solid var(--line);
            background:rgba(255,255,255,.04);
            color:var(--text);
            font-weight:800;
            cursor:pointer;
            transition:.15s ease;
        }
        .btn:hover{transform: translateY(-1px); background:rgba(255,255,255,.07)}
        .btn.primary{border-color:rgba(110,168,254,.35); background:rgba(110,168,254,.18)}
        .btn:focus{outline:none; box-shadow:var(--focus)}
        .foot{margin-top:16px; color:var(--muted); font-size:13px; line-height:1.6}
        .link{color:#cfe1ff; font-weight:750}
    </style>
</head>
<body>
<main class="card">
    <h1>로그인</h1>
    <p class="sub">아이디/비밀번호를 입력해 접속하세요.</p>

    <div class="msg error" th:if="${param.error}">
        로그인에 실패했어요. 아이디/비밀번호를 확인해 주세요.
    </div>
    <div class="msg ok" th:if="${param.logout}">
        로그아웃 되었습니다.
    </div>

    <form th:action="@{/login/process}" method="post">
        <label for="username">아이디</label>
        <input id="username" name="username" autocomplete="username" placeholder="예: user1" required>

        <label for="password">비밀번호</label>
        <input id="password" type="password" name="password" autocomplete="current-password" placeholder="비밀번호" required>

        <!-- CSRF(커스텀 로그인 POST는 보통 자동 처리되지만, 안전하게 넣어도 OK) -->
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="row">
            <button class="btn primary" type="submit">로그인</button>
            <a class="btn" th:href="@{/}">홈으로</a>
        </div>
    </form>

    <div class="foot">
        계정이 없나요?
        <a class="link" th:href="@{/member/signup}">회원가입</a>
    </div>
</main>
</body>
</html>
